server {
    listen 80;
    server_name _;
    index index.php index.html;
    
    root /var/www/html/public;

    # Redirect HTTP to HTTPS (uncomment when using SSL)
    # return 301 https://$host$request_uri;

    # Error and access logs
    error_log /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;

    # Static files
    location ~* ^.+\.(jpg|jpeg|gif|png|svg|js|css|mp3|gif|zip|rar|woff|woff2|ttf|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        # First attempt to serve request as file, then as directory
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Pass PHP to PHP-FPM or Apache
    location ~ \.php$ {
        # For PHP-FPM (jika menggunakan setup PHP-FPM)
        # fastcgi_pass app:9000;
        # fastcgi_index index.php;
        # include fastcgi_params;
        # fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

        # For Apache dalam container
        proxy_pass http://app:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }

    # Deny access to vendor directory
    location ~ /vendor {
        deny all;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;
}

